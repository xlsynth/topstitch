# SPDX-License-Identifier: Apache-2.0

# adapted from https://github.com/xlsynth/xlsynth-crate/blob/main/.github/workflows/publish.yml

name: Publish to crates.io

on:
  push:
    tags:
      - 'v*' # This will trigger the workflow on version tags like v1.0.0, v0.1.0, etc.

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: Deploy

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Validate version matches
      run: |
        # GITHUB_REF will be something like "refs/tags/v0.0.57"
        # We'll strip off the "refs/tags/" part, leaving "v0.0.57".
        VERSION="${GITHUB_REF#refs/tags/}"

        # Now invoke the Python script, passing the version.
        python check_version_is.py "$VERSION"

    - name: Set up Rust
      uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af
      with:
        toolchain: stable

    - name: Install libc++ runtime
      run: |
        sudo apt-get update
        sudo apt-get install -y libc++1 libc++abi1 || \
        sudo apt-get install -y libc++1-18 libc++abi1-18 || \
        sudo apt-get install -y libc++1-14 libc++abi1-14

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache Cargo index
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-

    - name: Build and test
      run: |
        curl -L -o slang "https://github.com/xlsynth/slang-rs/releases/download/ci/slang"
        chmod +x slang
        export SLANG_PATH=`realpath slang`
        cargo test
        rm slang

    - name: Authenticate with crates.io
      id: auth
      uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe

    - name: Publish topstitch to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        cargo publish
